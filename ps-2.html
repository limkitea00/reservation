<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>예약하기-1</title>
    <link rel="stylesheet" href="css/ps-2.css" />
  </head>
  <body>
    <!-- 전체 레이아웃 -->
    <div class="wrap">
      <!-- 메뉴 -->
      <nav class="navi">
        <ul>
          <li><a href="reservation.html#intro">이용안내</a></li>
          <li><a href="reservation.html#room">객실소개</a></li>
          <li><a href="reservation.html#reservation">예약 방법 및 요금</a></li>
          <li><a href="#">예약확인</a></li>
        </ul>
      </nav>
      <form id="signup">
        <fieldset>
          <legend>개인정보</legend>
          <ul class="user">
            <li>
              <label for="fullname">이름</label>
              <input type="text" id="fullname" placeholder="이름" required/>
            </li>
            <li>
              <label for="tel">전화번호</label>
              <input type="tel" id="tel" placeholder="010-1234-5678" required/>
            </li>
          </ul>
        </fieldset>
        <fieldset>
          <legend>객실형태</legend>
          <ul class="room">
            <li>
              <input type="radio" id="room" name="roomselect" required />
              <label for="room">기본형(최대 2인)</label>
            </li>
            <li>
              <input type="radio" id="family" name="roomselect" required />
              <label for="family">가족형(최대 4인)</label>
            </li>
          </ul>
        </fieldset>
                    <div class="btn-area">
                <p class="notice">정보를 확인한 후 버튼을 눌러주세요</p>
                <button type="submit">예약하기</button>
            </div>
      </form>
    </div>
  </body>
</html>
